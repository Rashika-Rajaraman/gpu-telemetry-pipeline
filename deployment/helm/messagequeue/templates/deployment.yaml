apiVersion: apps/v1
kind: Deployment
metadata:
  name: messagequeue
  labels:
    app: messagequeue
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: messagequeue
  template:
    metadata:
      labels:
        app: messagequeue
    spec:
      containers:
        - name: broker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: broker
              containerPort: {{ .Values.service.port }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
