# Streamer values. Scales via replicaCount; each replica shards the CSV by its
# StatefulSet ordinal (ORDINAL) over REPLICAS.
replicaCount: 2

image:
  repository: localhost:5001/streamer
  tag: dev
  pullPolicy: IfNotPresent

env:
  BROKER_ADDR: "message-queue:9000"
  CSV_PATH: "/data/dcgm_metrics_sample.csv"
  TOPIC: "telemetry"
  INTERVAL_MS: "100"

resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 250m
    memory: 128Mi
